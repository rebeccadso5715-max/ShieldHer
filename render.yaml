services:
  - type: web
    name: shieldher-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shieldher-db
          property: connectionString
      - key: SHIELDHER_FRONTEND_ORIGIN
        value: https://shieldher-frontend.onrender.com

  - type: web
    name: shieldher-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://shieldher-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: shieldher-db
    plan: free
    databaseName: shieldher
