services:
  - type: web
    name: shieldher-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/shieldher-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shieldher-db
          property: connectionString
      - key: SHIELDHER_FRONTEND_ORIGIN
        value: https://shieldher-frontend.onrender.com

  - type: web
    name: shieldher-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://shieldher-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: shieldher-db
    plan: free
    databaseName: shieldher
